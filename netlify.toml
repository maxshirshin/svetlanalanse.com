[build]
  command = "npm run build && echo '=== HTML files in dist/client ===' && find dist/client -name '*.html' | head -20 && echo '=== Removing dist/server ===' && rm -rf dist/server"
  publish = "dist/client"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
